<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#9D81BA">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Matilde ✨">
  <title>Matilde e le Stelline Magiche 🌈</title>
  <link rel="manifest" href="./manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Nunito:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --panna:   #FFF9F0;
      --marrone: #4A3728;
      --rosa:    #FFB7C5;
      --viola:   #9D81BA;
      --oro:     #FFD700;
      --verde:   #7EC8A0;
      --accento: #FF6B6B;
      --shadow:  rgba(74,55,40,0.12);
      --safe-top:    env(safe-area-inset-top, 40px);
      --safe-bottom: env(safe-area-inset-bottom, 16px);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body, html {
      margin:0; padding:0; width:100%; height:100%;
      background:#c8b4e8; font-family:'Nunito',sans-serif;
      color:var(--marrone); overflow:hidden;
      display:flex; align-items:center; justify-content:center;
    }
    #game-outer {
      width:100%; max-width:480px; height:100dvh;
      background:white; position:relative;
      display:flex; flex-direction:column;
      overflow:hidden; box-shadow:0 0 80px rgba(80,40,120,0.2);
    }

    /* PROGRESS */
    #progress-bar {
      position:absolute; top:0; left:0; height:4px;
      background:linear-gradient(90deg,var(--rosa),var(--viola),var(--oro));
      width:0%; transition:width 0.7s cubic-bezier(.4,0,.2,1); z-index:200;
    }

    /* HEADER */
    #header {
      position:absolute; top:0; width:100%;
      padding:calc(var(--safe-top) + 4px) 16px 8px;
      display:flex; justify-content:space-between; align-items:center;
      z-index:100; pointer-events:none;
    }
    .hud-badge {
      background:rgba(255,255,255,0.93);
      padding:6px 12px; border-radius:22px;
      box-shadow:0 3px 14px var(--shadow);
      font-family:'Baloo 2',cursive; font-weight:800;
      display:flex; align-items:center; gap:6px; font-size:0.95rem;
    }
    #score-display { border:2px solid var(--oro); }
    #score-display.pop { animation:scorePop 0.4s cubic-bezier(.36,.07,.19,.97); }
    @keyframes scorePop {
      0%{transform:scale(1)} 35%{transform:scale(1.28) rotate(-4deg)}
      65%{transform:scale(0.93) rotate(2deg)} 100%{transform:scale(1) rotate(0)}
    }
    #date-badge { border:2px solid var(--viola); font-size:0.75rem; pointer-events:all; cursor:pointer; gap:4px; }
    #date-badge:active { opacity:0.7; }
    #inventory-display { border:2px solid var(--rosa); min-width:46px; gap:3px; font-size:1rem; }
    .inventory-item { display:inline-block; animation:itemPop 0.4s cubic-bezier(.36,.07,.19,.97); }
    @keyframes itemPop {
      0%{transform:scale(0) rotate(-20deg);opacity:0}
      70%{transform:scale(1.2) rotate(5deg);opacity:1}
      100%{transform:scale(1) rotate(0);opacity:1}
    }

    /* VISUAL */
    #visual-area { flex:1.3; position:relative; overflow:hidden; }
    #scene-svg { width:100%; height:100%; position:absolute; top:0; left:0; transition:opacity 0.45s ease; }
    #scene-svg.fade-out { opacity:0; }

    /* DAY STRIP — in alto nell'area visuale, sotto i badge */
    #day-strip {
      position:absolute;
      top:calc(var(--safe-top) + 58px);
      left:50%; transform:translateX(-50%);
      background:rgba(255,255,255,0.92);
      border:2px solid var(--viola); border-radius:16px; padding:4px 14px;
      font-family:'Baloo 2',cursive; font-size:0.8rem;
      color:var(--viola); white-space:nowrap; z-index:50;
      pointer-events:none; box-shadow:0 3px 10px var(--shadow);
      backdrop-filter:blur(4px);
    }

    /* ITEMS BANNER — finale */
    #items-banner {
      position:absolute; bottom:12px; left:50%; transform:translateX(-50%);
      background:rgba(255,255,255,0.93); border:2px solid var(--oro);
      border-radius:20px; padding:5px 16px;
      font-family:'Baloo 2',cursive; font-size:0.8rem;
      color:#5a3e00; white-space:nowrap; z-index:50;
      pointer-events:none; box-shadow:0 3px 12px rgba(255,215,0,0.35);
      display:none;
    }
    #items-banner.show { display:block; animation:bannerIn 0.5s cubic-bezier(.36,.07,.19,.97); }
    @keyframes bannerIn {
      from{transform:translateX(-50%) scale(0.7);opacity:0}
      to{transform:translateX(-50%) scale(1);opacity:1}
    }

    /* UI AREA */
    #ui-area {
      flex:0.7; padding:20px 18px calc(var(--safe-bottom) + 8px);
      background:white; border-top-left-radius:42px; border-top-right-radius:42px;
      margin-top:-42px; z-index:10;
      box-shadow:0 -18px 40px rgba(0,0,0,0.06);
      display:flex; flex-direction:column; overflow:hidden;
    }
    #content-animator {
      display:flex; flex-direction:column; height:100%;
      transition:opacity 0.25s ease, transform 0.3s ease;
    }
    #content-animator.slide-out { opacity:0; transform:translateY(16px); }
    #content-animator.slide-in  { animation:slideIn 0.38s ease-out forwards; }
    @keyframes slideIn {
      from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)}
    }
    h2 {
      font-family:'Baloo 2',cursive; font-size:clamp(1.2rem,4.2vw,1.5rem);
      margin:0 0 7px; line-height:1.2; color:var(--marrone);
    }
    #story-text {
      font-size:clamp(0.88rem,3vw,1rem); line-height:1.6;
      margin-bottom:12px; flex-shrink:0; overflow-y:auto; max-height:16vh;
    }

    /* CHOICES — affiancate */
    .choices-grid { display:grid; gap:9px; flex:1; align-content:start; overflow-y:auto; }
    .choices-grid.two-cols { grid-template-columns:1fr 1fr; }

    .btn-choice {
      background:white; border:2.5px solid #EFEFEF;
      padding:10px 10px 12px; border-radius:18px; cursor:pointer;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:6px; font-family:'Baloo 2',cursive;
      font-size:clamp(0.82rem,2.8vw,0.95rem); text-align:center;
      transition:transform .18s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease;
      color:var(--marrone); position:relative; overflow:hidden; min-height:76px;
    }
    /* 1 scelta sola → riga */
    .choices-grid:not(.two-cols) .btn-choice {
      flex-direction:row; text-align:left; padding:13px 15px; min-height:52px;
    }
    .btn-choice::before {
      content:''; position:absolute; inset:0; border-radius:16px;
      background:linear-gradient(135deg,rgba(255,183,197,.2),rgba(157,129,186,.14));
      opacity:0; transition:opacity .2s;
    }
    .btn-choice:hover { border-color:var(--rosa); transform:translateY(-2px); box-shadow:0 6px 18px rgba(255,183,197,.4); }
    .btn-choice:hover::before { opacity:1; }
    .btn-choice:active { transform:scale(0.95); background:#FFF5F7; }
    .btn-choice.gold:hover { border-color:var(--oro); box-shadow:0 6px 18px rgba(255,215,0,.3); }
    .btn-emoji { font-size:1.8rem; flex-shrink:0; line-height:1; }
    .choices-grid:not(.two-cols) .btn-emoji { font-size:1.65rem; }
    .btn-label { font-size:inherit; line-height:1.25; }
    .btn-pts {
      background:var(--oro); color:#5a3e00; font-size:0.68rem;
      padding:1px 6px; border-radius:10px;
      font-family:'Baloo 2',cursive; font-weight:800;
    }
    .choices-grid:not(.two-cols) .btn-pts { margin-left:auto; }

    /* LOADING */
    #loading-overlay {
      position:absolute; inset:0; z-index:500;
      background:rgba(255,249,240,0.97);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:18px;
      opacity:1; transition:opacity .4s ease;
    }
    #loading-overlay.hidden { opacity:0; pointer-events:none; }
    .loading-star { font-size:3.5rem; animation:spinStar 1.8s ease-in-out infinite; }
    @keyframes spinStar {
      0%{transform:rotate(0) scale(1)} 50%{transform:rotate(180deg) scale(1.2)} 100%{transform:rotate(360deg) scale(1)}
    }
    .loading-text { font-family:'Baloo 2',cursive; font-size:1.2rem; color:var(--viola); text-align:center; padding:0 30px; }
    .loading-dots span { animation:blink 1.2s infinite; font-size:1.4rem; }
    .loading-dots span:nth-child(2){animation-delay:.2s}
    .loading-dots span:nth-child(3){animation-delay:.4s}
    @keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

    /* ERROR */
    #error-overlay {
      position:absolute; inset:0; z-index:500;
      background:rgba(255,249,240,0.97);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:14px;
      opacity:0; pointer-events:none; transition:opacity .3s; padding:30px;
    }
    #error-overlay.show { opacity:1; pointer-events:all; }
    .err-icon { font-size:3rem; }
    .err-msg  { font-family:'Baloo 2',cursive; font-size:1.1rem; color:var(--marrone); text-align:center; line-height:1.5; }
    .err-btn  { background:var(--viola); color:white; border:none; border-radius:20px; padding:12px 28px; font-family:'Baloo 2',cursive; font-size:1rem; cursor:pointer; margin-top:6px; }
    .err-btn:active{opacity:.8}

    /* FLOATING STARS */
    .floating-star { position:fixed; pointer-events:none; z-index:999; font-size:1.5rem; animation:floatUp 1.3s ease-out forwards; }
    @keyframes floatUp {
      0%{opacity:1;transform:translateY(0) scale(1) rotate(0)}
      100%{opacity:0;transform:translateY(-85px) scale(1.4) rotate(25deg)}
    }

    /* INVENTORY SHAKE */
    @keyframes invShake {
      0%,100%{transform:rotate(0)}
      20%{transform:rotate(-12deg) scale(1.15)}
      40%{transform:rotate(10deg) scale(1.2)}
      60%{transform:rotate(-8deg) scale(1.1)}
      80%{transform:rotate(6deg)}
    }
    .inv-shake { animation:invShake 0.55s ease-in-out; }

    /* VICTORY */
    #victory-overlay { position:absolute; inset:0; z-index:300; pointer-events:none; }
    #victory-overlay.show { animation:vFlash .7s ease-out; }
    @keyframes vFlash {
      0%{background:rgba(255,215,0,0)} 30%{background:rgba(255,215,0,0.38)} 100%{background:rgba(255,215,0,0)}
    }

    /* BONUS INVENTARIO nel testo */
    .inventory-bonus {
      display:inline-block;
      background:linear-gradient(90deg,#fff5c0,#ffe0f0);
      border-radius:8px; padding:2px 8px;
      font-size:0.88em; margin-left:4px;
      border:1px solid #ffd0a0;
      animation:bonusIn 0.4s ease-out;
    }
    @keyframes bonusIn{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}
  </style>
</head>
<body>
<div id="game-outer">
  <div id="progress-bar"></div>
  <div id="header">
    <div id="score-display" class="hud-badge">⭐ <span id="points">0</span></div>
    <div id="date-badge"    class="hud-badge" onclick="showDateInfo()">📅 <span id="date-label">...</span></div>
    <div id="inventory-display" class="hud-badge"><span id="inv-items">🎒</span></div>
  </div>

  <div id="visual-area">
    <svg id="scene-svg" viewBox="0 0 500 360" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="day-strip">✨ Storia del giorno</div>
    <div id="items-banner"></div>
  </div>

  <div id="ui-area">
    <div id="content-animator">
      <h2 id="title">Caricamento…</h2>
      <p  id="story-text"></p>
      <div id="choices" class="choices-grid"></div>
    </div>
  </div>

  <div id="loading-overlay">
    <div class="loading-star">🌟</div>
    <div class="loading-text">Matilde sta preparando<br>la storia di oggi…</div>
    <div class="loading-dots"><span>✨</span><span>✨</span><span>✨</span></div>
  </div>

  <div id="error-overlay">
    <div class="err-icon">🌧️</div>
    <div class="err-msg" id="err-msg">Non riesco a caricare la storia! Controlla la connessione.</div>
    <button class="err-btn" onclick="retryLoad()">Riprova 🔄</button>
    <button class="err-btn" style="background:var(--verde)" onclick="loadFallback()">Usa storia classica 📖</button>
  </div>

  <div id="victory-overlay"></div>
</div>

<script>
const API_KEY    = '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';
const TOTAL_SCENES = 5;

let gameState = { score:0, inventory:[], currentScene:'s0', visitedScenes:new Set() };
let currentStoryData = null;

const titleEl      = document.getElementById('title');
const storyEl      = document.getElementById('story-text');
const choicesEl    = document.getElementById('choices');
const pointsEl     = document.getElementById('points');
const progressBar  = document.getElementById('progress-bar');
const scoreDisplay = document.getElementById('score-display');
const invItems     = document.getElementById('inv-items');
const sceneSVG     = document.getElementById('scene-svg');
const contentAnim  = document.getElementById('content-animator');
const victoryOvl   = document.getElementById('victory-overlay');
const loadingOvl   = document.getElementById('loading-overlay');
const errorOvl     = document.getElementById('error-overlay');
const dateLabel    = document.getElementById('date-label');
const dayStrip     = document.getElementById('day-strip');
const itemsBanner  = document.getElementById('items-banner');

function todayKey()   { const d=new Date(); return `matilde_${d.getFullYear()}_${d.getMonth()+1}_${d.getDate()}`; }
function todayLabel() { return new Date().toLocaleDateString('it-IT',{day:'numeric',month:'short'}); }
function showDateInfo() {
  alert(`📅 ${new Date().toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}\n\nOgni giorno una nuova avventura! ✨\nGli oggetti che raccogli cambiano il finale 🗝️⭐🌟`);
}

// ── INTERAZIONI INVENTARIO ──────────────────────────
function inventoryBonus(sceneId) {
  const inv = gameState.inventory;
  const has = e => inv.includes(e);
  if (sceneId === 's1' && has('⭐'))
    return `<span class="inventory-bonus">⭐ La tua stellina brilla e lo scoiattolo la nota subito!</span>`;
  if ((sceneId === 's2' || sceneId === 's2b') && has('🌟'))
    return `<span class="inventory-bonus">🌟 La stellina magica illumina il tuo cammino!</span>`;
  if (sceneId === 's3' && (has('⭐') || has('🌟'))) {
    const icons = [has('⭐')&&'⭐', has('🌟')&&'🌟'].filter(Boolean).join('');
    return `<span class="inventory-bonus">${icons} Le stelle che porti con te richiamano la chiave!</span>`;
  }
  return '';
}

function buildEndingText(base) {
  const inv = gameState.inventory;
  const has = e => inv.includes(e);
  const hasKey=has('🗝️'), hasStar1=has('⭐'), hasStar2=has('🌟');
  const count=[hasKey,hasStar1,hasStar2].filter(Boolean).length;
  if (!count) return base;
  let extra='';
  if (hasKey)   extra += ` La <b>Chiave dell'Arcobaleno</b> 🗝️ scatta nel lucchetto con un <em>clic</em> magico!`;
  if (hasStar1) extra += ` La <b>Stellina d'Oro</b> ⭐ trovata nel calzino illumina tutto di dorato!`;
  if (hasStar2) extra += ` La <b>Stellina Magica</b> 🌟 trasforma una caramella in un sogno da vivere stanotte!`;
  if (count===3) extra += ` <b>HAI TROVATO TUTTO! 🏆 Matilde è la Campionessa delle Stelline!</b>`;
  return base + extra;
}

function shakeInventoryIfRelevant(sceneId) {
  if (!inventoryBonus(sceneId)) return;
  const badge = document.getElementById('inventory-display');
  badge.classList.remove('inv-shake'); void badge.offsetWidth;
  badge.classList.add('inv-shake');
  setTimeout(() => badge.classList.remove('inv-shake'), 600);
}

function showItemsBanner() {
  const inv = gameState.inventory;
  if (!inv.length) return;
  itemsBanner.textContent = 'Hai usato: ' + inv.join('  ') + ' per aprire la scatola!';
  itemsBanner.classList.add('show');
}
function hideItemsBanner() { itemsBanner.classList.remove('show'); }

// ── API ─────────────────────────────────────────────
async function generateDailyStory() {
  const today=new Date();
  const dateStr=today.toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'});
  const seed=today.getFullYear()*10000+(today.getMonth()+1)*100+today.getDate();
  const themes=["una foresta di cristallo con fate musicanti","un castello di nuvole con draghi gentili","un mare di stelle con pesci luminosi","un villaggio di funghi giganti con gnomi","una montagna di cioccolato con animali cuochi","un giardino dove i fiori cantano","una biblioteca magica con libri viventi","un circo volante con acrobati arcobaleno","una città sottomarina con sirene amiche","una foresta autunnale con folletti arancioni","un treno magico che vola tra le nuvole","un mercato delle stelle cadenti","una cucina gigante abitata da dolci viventi","un bosco dove ogni albero è un musicista"];
  const theme=themes[seed%themes.length];
  const prompt=`Sei un narratore magico per bambini 4-8 anni. Crea storia interattiva per Matilde e la gatta Luna.
TEMA (${dateStr}): ${theme}
Rispondi SOLO con JSON valido:
{"dayTitle":"Titolo max 38 caratteri","scenes":{"s0":{"id":"s0","title":"Titolo emoji","text":"2-3 frasi presentazione missione con <b>grassetto</b>","visual":"bedroom","progress":0,"choices":[{"text":"Scelta 5-7 parole","next":"s1","emoji":"🌟"},{"text":"Scelta 5-7 parole","next":"s1b","emoji":"🌈","points":1}]},"s1":{"id":"s1","title":"Titolo emoji","text":"2-3 frasi personaggio magico e sfida","visual":"garden","progress":2,"choices":[{"text":"Scelta coraggiosa","next":"s2","emoji":"⚡","points":1},{"text":"Scelta gentile","next":"s2b","emoji":"💝","points":2}]},"s1b":{"id":"s1b","title":"Titolo emoji","text":"Matilde trova qualcosa di speciale","visual":"garden","progress":1,"collectItem":"⭐","choices":[{"text":"Continua 5-7 parole","next":"s2","emoji":"🚀"}]},"s2":{"id":"s2","title":"Titolo emoji","text":"Momento azione","visual":"forest","progress":3,"choices":[{"text":"Avanza 5-7 parole","next":"s3","emoji":"🎯"}]},"s2b":{"id":"s2b","title":"Titolo emoji","text":"Gentilezza premiata con dono speciale","visual":"forest","progress":3,"collectItem":"🌟","choices":[{"text":"Continua 5-7 parole","next":"s3","emoji":"🌈"}]},"s3":{"id":"s3","title":"Titolo emoji","text":"Matilde trova la chiave magica!","visual":"stream","progress":4,"collectItem":"🗝️","choices":[{"text":"Torna a casa!","next":"s4","emoji":"🏠","points":2}]},"s4":{"id":"s4","title":"Vittoria! 🎉","text":"Finale: Matilde apre la scatola. Premio magico legato al tema ${theme}.","visual":"win","progress":5,"choices":[{"text":"Ricomincia l'avventura ✨","next":"s0","emoji":"🔄","reset":true}]}}}
Solo JSON, tema ben riconoscibile, linguaggio poetico semplice.`;

  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,messages:[{role:'user',content:prompt}]})
  });
  if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error?.message||`HTTP ${resp.status}`);}
  const data=await resp.json();
  const raw=data.content.find(b=>b.type==='text')?.text||'';
  return JSON.parse(raw.replace(/```json|```/g,'').trim());
}

// ── LOAD ────────────────────────────────────────────
async function loadDailyStory() {
  dateLabel.textContent=todayLabel();
  const key=todayKey();
  try{const c=localStorage.getItem(key);if(c){currentStoryData=JSON.parse(c);dayStrip.textContent='📖 '+(currentStoryData.dayTitle||'Storia del giorno');hideLoading();loadScene('s0');return;}}catch(e){}
  try{
    currentStoryData=await generateDailyStory();
    try{localStorage.setItem(key,JSON.stringify(currentStoryData));}catch(e){}
    dayStrip.textContent='📖 '+(currentStoryData.dayTitle||'Storia del giorno');
    hideLoading();loadScene('s0');
  }catch(err){console.error(err);showError(err.message);}
}
function retryLoad(){errorOvl.classList.remove('show');loadingOvl.classList.remove('hidden');setTimeout(loadDailyStory,300);}
function loadFallback(){errorOvl.classList.remove('show');currentStoryData=FALLBACK_STORY;dayStrip.textContent='📖 Storia Classica';hideLoading();loadScene('s0');}
function hideLoading(){loadingOvl.classList.add('hidden');}
function showError(msg){loadingOvl.classList.add('hidden');document.getElementById('err-msg').textContent='Ops! '+(msg||'Errore')+'. Riprova o usa la storia classica!';errorOvl.classList.add('show');}

// ── SCENE ────────────────────────────────────────────
function loadScene(sceneId,opts={}){
  const{points=0,reset=false}=opts;
  if(reset){gameState={score:0,inventory:[],currentScene:'s0',visitedScenes:new Set()};pointsEl.textContent='0';invItems.innerHTML='🎒';progressBar.style.width='0%';hideItemsBanner();}
  updateScore(points);
  const allScenes=currentStoryData?.scenes||FALLBACK_STORY.scenes;
  const scene=allScenes[sceneId];if(!scene)return;
  gameState.currentScene=sceneId;gameState.visitedScenes.add(sceneId);
  if(scene.collectItem)addToInventory(scene.collectItem);
  if(scene.progress!==undefined)updateProgress(scene.progress);
  if(sceneId==='s4'){flashVictory();showItemsBanner();}else{hideItemsBanner();}
  shakeInventoryIfRelevant(sceneId);
  contentAnim.classList.add('slide-out');
  setTimeout(()=>{
    const svgContent=SVG_SCENES[scene.visual]||SVG_SCENES.garden;
    sceneSVG.classList.add('fade-out');
    setTimeout(()=>{sceneSVG.innerHTML=svgContent;sceneSVG.classList.remove('fade-out');},260);
    titleEl.textContent=scene.title;
    const bonus=inventoryBonus(sceneId);
    const baseText=sceneId==='s4'?buildEndingText(scene.text):scene.text;
    storyEl.innerHTML=baseText+bonus;
    choicesEl.innerHTML='';
    const choices=scene.choices||[];
    if(choices.length===2){choicesEl.classList.add('two-cols');}else{choicesEl.classList.remove('two-cols');}
    choices.forEach(choice=>{
      const btn=document.createElement('button');
      btn.className='btn-choice'+(choice.points?' gold':'');
      btn.innerHTML=`<span class="btn-emoji">${choice.emoji||'✨'}</span><span class="btn-label">${choice.text}</span>${choice.points?`<span class="btn-pts">+${choice.points}⭐</span>`:''}`;
      btn.addEventListener('click',()=>loadScene(choice.next,{points:choice.points||0,reset:choice.reset||false}));
      choicesEl.appendChild(btn);
    });
    contentAnim.classList.remove('slide-out');
    contentAnim.classList.add('slide-in');
    setTimeout(()=>contentAnim.classList.remove('slide-in'),420);
  },260);
}

// ── HUD ──────────────────────────────────────────────
function updateScore(delta){
  if(!delta)return;
  gameState.score+=delta;pointsEl.textContent=gameState.score;
  scoreDisplay.classList.remove('pop');void scoreDisplay.offsetWidth;scoreDisplay.classList.add('pop');
  spawnStar(delta);
}
function spawnStar(delta){
  const r=scoreDisplay.getBoundingClientRect();
  const el=document.createElement('div');
  el.className='floating-star';el.textContent='+'+delta+'⭐';
  el.style.left=(r.left+r.width/2-20)+'px';el.style.top=(r.bottom+6)+'px';
  document.body.appendChild(el);setTimeout(()=>el.remove(),1400);
}
function addToInventory(emoji){
  if(!emoji||gameState.inventory.includes(emoji))return;
  gameState.inventory.push(emoji);
  const sp=document.createElement('span');sp.className='inventory-item';sp.textContent=emoji;
  if(invItems.textContent==='🎒')invItems.textContent='';
  invItems.appendChild(sp);
}
function updateProgress(step){progressBar.style.width=Math.min((step/TOTAL_SCENES)*100,100)+'%';}
function flashVictory(){victoryOvl.classList.add('show');setTimeout(()=>victoryOvl.classList.remove('show'),800);}

if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
loadDailyStory();
