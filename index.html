<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#9D81BA">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Matilde ✨">
  <title>Matilde e le Stelline Magiche 🌈</title>
  <link rel="manifest" href="./manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Nunito:wght@400;700&display=swap" rel="stylesheet">

  <style>
    /* ════════════════════════════════════════════
       RESET & ROOT
       OnePlus 13R: 6.78" · 1264×2780px · 20.1:9
       ════════════════════════════════════════════ */
    :root {
      --panna:   #FFF9F0;
      --marrone: #4A3728;
      --rosa:    #FFB7C5;
      --viola:   #9D81BA;
      --oro:     #FFD700;
      --verde:   #7EC8A0;
      --cielo:   #AEE4F5;
      --accento: #FF6B6B;
      --shadow:  rgba(74,55,40,0.12);

      /* Proporzioni schermo 13R: top safe-area importante */
      --safe-top:    env(safe-area-inset-top, 40px);
      --safe-bottom: env(safe-area-inset-bottom, 16px);

      /* Altezza UI calibrata per aspect ratio 20:9 */
      --visual-flex: 1.3;
      --ui-flex:     0.7;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body, html {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #c8b4e8;
      font-family: 'Nunito', sans-serif;
      color: var(--marrone);
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }

    #game-outer {
      width: 100%;
      max-width: 480px;       /* OnePlus 13R ~412dp di larghezza reale */
      height: 100dvh;
      background: white;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 80px rgba(80,40,120,0.2);
    }

    /* ─── PROGRESS BAR ─── */
    #progress-bar {
      position: absolute; top: 0; left: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--rosa), var(--viola), var(--oro));
      width: 0%;
      transition: width 0.7s cubic-bezier(.4,0,.2,1);
      z-index: 200;
    }

    /* ─── HEADER (con safe-area) ─── */
    #header {
      position: absolute; top: 0; width: 100%;
      padding: calc(var(--safe-top) + 4px) 18px 8px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 100; pointer-events: none;
    }

    .hud-badge {
      background: rgba(255,255,255,0.93);
      padding: 7px 14px; border-radius: 22px;
      box-shadow: 0 3px 14px var(--shadow);
      font-family: 'Baloo 2', cursive; font-weight: 800;
      display: flex; align-items: center; gap: 7px;
      font-size: 1rem;
    }

    #score-display { border: 2px solid var(--oro); }
    #score-display.pop {
      animation: scorePop 0.4s cubic-bezier(.36,.07,.19,.97);
    }
    @keyframes scorePop {
      0%  { transform: scale(1); }
      35% { transform: scale(1.28) rotate(-4deg); }
      65% { transform: scale(0.93) rotate(2deg); }
      100%{ transform: scale(1)    rotate(0); }
    }

    #date-badge {
      border: 2px solid var(--viola);
      font-size: 0.78rem;
      pointer-events: all;
      cursor: pointer;
      gap: 5px;
    }
    #date-badge:active { opacity: 0.7; }

    #inventory-display {
      border: 2px solid var(--rosa);
      min-width: 48px; gap: 4px; font-size: 1.05rem;
    }

    .inventory-item {
      display: inline-block;
      animation: itemPop 0.4s cubic-bezier(.36,.07,.19,.97);
    }
    @keyframes itemPop {
      0%  { transform: scale(0) rotate(-20deg); opacity:0; }
      70% { transform: scale(1.2) rotate(5deg); opacity:1; }
      100%{ transform: scale(1)   rotate(0);    opacity:1; }
    }

    /* ─── VISUAL AREA (più alta su 20:9) ─── */
    #visual-area {
      flex: var(--visual-flex);
      position: relative;
      overflow: hidden;
    }

    #scene-svg {
      width: 100%; height: 100%;
      position: absolute; top: 0; left: 0;
      transition: opacity 0.45s ease;
    }
    #scene-svg.fade-out { opacity: 0; }

    /* ─── UI AREA ─── */
    #ui-area {
      flex: var(--ui-flex);
      padding: 22px 22px calc(var(--safe-bottom) + 10px);
      background: white;
      border-top-left-radius:  42px;
      border-top-right-radius: 42px;
      margin-top: -42px;
      z-index: 10;
      box-shadow: 0 -18px 40px rgba(0,0,0,0.06);
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    #content-animator {
      display: flex; flex-direction: column;
      height: 100%;
      transition: opacity 0.25s ease, transform 0.3s ease;
    }
    #content-animator.slide-out {
      opacity: 0; transform: translateY(16px);
    }
    #content-animator.slide-in {
      animation: slideIn 0.38s ease-out forwards;
    }
    @keyframes slideIn {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0);    }
    }

    h2 {
      font-family: 'Baloo 2', cursive;
      font-size: clamp(1.3rem, 4.5vw, 1.6rem);
      margin: 0 0 8px;
      line-height: 1.2;
      color: var(--marrone);
    }

    #story-text {
      font-size: clamp(0.95rem, 3.2vw, 1.05rem);
      line-height: 1.6;
      margin-bottom: 14px;
      flex-shrink: 0;
      overflow-y: auto;
      max-height: 18vh;   /* calibrato per 13R: c'è spazio */
    }

    .choices-grid {
      display: grid; gap: 9px;
      flex: 1; align-content: start;
      overflow-y: auto;
    }

    .btn-choice {
      background: white;
      border: 2.5px solid #EFEFEF;
      padding: 13px 15px;
      border-radius: 18px; cursor: pointer;
      display: flex; align-items: center; gap: 12px;
      font-family: 'Baloo 2', cursive;
      font-size: clamp(0.95rem, 3.2vw, 1.05rem);
      text-align: left;
      transition: transform .18s ease, border-color .18s ease,
                  background .18s ease, box-shadow .18s ease;
      color: var(--marrone);
      position: relative; overflow: hidden;
      min-height: 52px;    /* touch target OnePlus ~7mm = 48dp */
    }
    .btn-choice::before {
      content:''; position:absolute; inset:0; border-radius:16px;
      background: linear-gradient(135deg,rgba(255,183,197,.18),rgba(157,129,186,.12));
      opacity:0; transition:opacity .2s;
    }
    .btn-choice:hover { border-color:var(--rosa); transform:translateY(-2px); box-shadow:0 6px 18px rgba(255,183,197,.35); }
    .btn-choice:hover::before { opacity:1; }
    .btn-choice:active { transform:scale(0.96); background:#FFF5F7; }
    .btn-choice.gold:hover { border-color:var(--oro); box-shadow:0 6px 18px rgba(255,215,0,.3); }
    .btn-emoji { font-size:1.65rem; flex-shrink:0; }
    .btn-pts {
      margin-left:auto; background:var(--oro);
      color:#5a3e00; font-size:.72rem;
      padding:2px 7px; border-radius:10px;
      font-family:'Baloo 2',cursive; font-weight:800; flex-shrink:0;
    }

    /* ─── LOADING OVERLAY ─── */
    #loading-overlay {
      position:absolute; inset:0; z-index:500;
      background:rgba(255,249,240,0.97);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:18px;
      opacity:1; transition:opacity .4s ease;
    }
    #loading-overlay.hidden { opacity:0; pointer-events:none; }

    .loading-star {
      font-size:3.5rem;
      animation: spinStar 1.8s ease-in-out infinite;
    }
    @keyframes spinStar {
      0%   { transform:rotate(0)   scale(1);    }
      50%  { transform:rotate(180deg) scale(1.2); }
      100% { transform:rotate(360deg) scale(1); }
    }
    .loading-text {
      font-family:'Baloo 2',cursive; font-size:1.2rem;
      color:var(--viola); text-align:center; padding:0 30px;
    }
    .loading-dots span {
      animation: blink 1.2s infinite;
      font-size:1.4rem;
    }
    .loading-dots span:nth-child(2){ animation-delay:.2s; }
    .loading-dots span:nth-child(3){ animation-delay:.4s; }
    @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

    /* ─── ERROR OVERLAY ─── */
    #error-overlay {
      position:absolute; inset:0; z-index:500;
      background:rgba(255,249,240,0.97);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:14px;
      opacity:0; pointer-events:none;
      transition:opacity .3s;
      padding:30px;
    }
    #error-overlay.show { opacity:1; pointer-events:all; }
    .err-icon { font-size:3rem; }
    .err-msg {
      font-family:'Baloo 2',cursive; font-size:1.1rem;
      color:var(--marrone); text-align:center; line-height:1.5;
    }
    .err-btn {
      background:var(--viola); color:white;
      border:none; border-radius:20px;
      padding:12px 28px; font-family:'Baloo 2',cursive;
      font-size:1rem; cursor:pointer; margin-top:8px;
    }
    .err-btn:active { opacity:.8; }

    /* ─── FLOATING STARS ─── */
    .floating-star {
      position:fixed; pointer-events:none; z-index:999;
      font-size:1.5rem;
      animation:floatUp 1.3s ease-out forwards;
    }
    @keyframes floatUp {
      0%  { opacity:1; transform:translateY(0) scale(1) rotate(0); }
      100%{ opacity:0; transform:translateY(-85px) scale(1.4) rotate(25deg); }
    }

    /* ─── VICTORY FLASH ─── */
    #victory-overlay {
      position:absolute; inset:0; z-index:300;
      pointer-events:none;
    }
    #victory-overlay.show {
      animation:vFlash .7s ease-out;
    }
    @keyframes vFlash {
      0%  { background:rgba(255,215,0,0);    }
      30% { background:rgba(255,215,0,0.35); }
      100%{ background:rgba(255,215,0,0);    }
    }

    /* ─── DAY BADGE strip ─── */
    #day-strip {
      position:absolute; bottom: calc(var(--ui-flex-px, 42%) + 6px);
      left:50%; transform:translateX(-50%);
      background:rgba(255,255,255,0.9);
      border:2px solid var(--viola);
      border-radius:16px; padding:4px 14px;
      font-family:'Baloo 2',cursive; font-size:.82rem;
      color:var(--viola); white-space:nowrap;
      z-index:50; pointer-events:none;
      box-shadow:0 3px 10px var(--shadow);
    }
  </style>
</head>

<div id="game-outer">
  <div id="progress-bar"></div>

  <div id="header">
    <div id="score-display" class="hud-badge">⭐ <span id="points">0</span></div>
    <div id="date-badge"    class="hud-badge" title="Storia di oggi" onclick="showDateInfo()">📅 <span id="date-label">...</span></div>
    <div id="inventory-display" class="hud-badge"><span id="inv-items">🎒</span></div>
  </div>

  <div id="visual-area">
    <svg id="scene-svg" viewBox="0 0 500 360" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="day-strip">✨ Storia del giorno</div>
  </div>

  <div id="ui-area">
    <div id="content-animator">
      <h2 id="title">Caricamento…</h2>
      <p  id="story-text"></p>
      <div id="choices" class="choices-grid"></div>
    </div>
  </div>

  <!-- Loading -->
  <div id="loading-overlay">
    <div class="loading-star">🌟</div>
    <div class="loading-text">Matilde sta preparando<br>la storia di oggi…</div>
    <div class="loading-dots"><span>✨</span><span>✨</span><span>✨</span></div>
  </div>

  <!-- Error -->
  <div id="error-overlay">
    <div class="err-icon">🌧️</div>
    <div class="err-msg" id="err-msg">Ops! Non riesco a trovare la storia di oggi. Controlla la connessione!</div>
    <button class="err-btn" onclick="retryLoad()">Riprova 🔄</button>
    <button class="err-btn" style="background:var(--verde)" onclick="loadFallback()">Usa storia classica 📖</button>
  </div>

  <div id="victory-overlay"></div>
</div>

// ═══════════════════════════════════════════════
//  GENERAZIONE STORIA VIA API ANTHROPIC
// ═══════════════════════════════════════════════
const SCENE_VISUALS = ['bedroom','garden','forest','stream','win'];

async function generateDailyStory() {
  const today = new Date();
  const dateStr = today.toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'});
  const seed = today.getFullYear() * 10000 + (today.getMonth()+1) * 100 + today.getDate();

  // Temi che ruotano ogni giorno
  const themes = [
    "una foresta di cristallo con fate musicanti",
    "un castello di nuvole abitato da draghi gentili",
    "un mare di stelle con pesci luminosi",
    "un villaggio di funghi giganti con gnomi sapienti",
    "una montagna di cioccolato con animali cuochi",
    "un giardino dove i fiori parlano e cantano",
    "una biblioteca magica con libri che prendono vita",
    "un circo volante con acrobati arcobaleno",
    "una città sottomarino con sirene amiche",
    "una foresta autunnale con folletti arancioni"
  ];
  const theme = themes[seed % themes.length];

  const prompt = `Sei un narratore di storie magiche per bambini di 4-8 anni. Crea una storia interattiva originale per Matilde, una bambina curiosa con la gatta Luna.

TEMA DI OGGI (${dateStr}): ${theme}

Crea UNA storia con ESATTAMENTE questa struttura JSON (niente altro, solo JSON valido):

{
  "dayTitle": "Titolo evocativo della storia di oggi (max 40 caratteri)",
  "scenes": {
    "s0": {
      "id": "s0",
      "title": "Titolo scena 1 con emoji 🌸",
      "text": "Testo della scena (2-3 frasi, usa <b>grassetto</b> per oggetti importanti). Deve presentare la missione di oggi.",
      "visual": "bedroom",
      "progress": 0,
      "choices": [
        {"text": "Prima scelta (5-8 parole)", "next": "s1", "emoji": "🌟"},
        {"text": "Seconda scelta (5-8 parole)", "next": "s1b", "emoji": "🌈", "points": 1}
      ]
    },
    "s1": {
      "id": "s1",
      "title": "Titolo scena 2 con emoji",
      "text": "Testo scena 2 coerente col tema. Introduce un personaggio magico.",
      "visual": "garden",
      "progress": 1,
      "choices": [
        {"text": "Scelta coraggiosa (5-8 parole)", "next": "s2", "emoji": "⚡", "points": 1},
        {"text": "Scelta gentile (5-8 parole)", "next": "s2b", "emoji": "💝", "points": 2}
      ]
    },
    "s1b": {
      "id": "s1b",
      "title": "Titolo variante con emoji",
      "text": "Testo alternativo scena 2. Matilde trova qualcosa di speciale.",
      "visual": "garden",
      "progress": 1,
      "collectItem": "⭐",
      "choices": [
        {"text": "Continua l'avventura (5-8 parole)", "next": "s2", "emoji": "🚀"}
      ]
    },
    "s2": {
      "id": "s2",
      "title": "Titolo scena 3 con emoji",
      "text": "Testo scena 3. Momento di azione o sfida.",
      "visual": "forest",
      "progress": 2,
      "choices": [
        {"text": "Avanza verso l'obiettivo (5-8 parole)", "next": "s3", "emoji": "🎯"}
      ]
    },
    "s2b": {
      "id": "s2b",
      "title": "Titolo variante scena 3 con emoji",
      "text": "Testo variante scena 3. Matilde usa gentilezza e ottiene una ricompensa.",
      "visual": "forest",
      "progress": 2,
      "collectItem": "🌟",
      "choices": [
        {"text": "Continua verso la meta (5-8 parole)", "next": "s3", "emoji": "🌈"}
      ]
    },
    "s3": {
      "id": "s3",
      "title": "Titolo scena finale pre-vittoria con emoji",
      "text": "Testo scena 4. Matilde trova l'oggetto magico del giorno.",

      ]
    },

      "visual": "win",

REGOLE IMPORTANTI:
- Linguaggio semplice e magico, adatto a bambini piccoli

- Il tema "${theme}" deve essere chiaramente riconoscibile
- Usa <b>grassetto</b> per oggetti e nomi speciali
- Solo JSON valido, nessun testo prima o dopo`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': API_KEY,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 2000,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${response.status}`);
  }

  const data = await response.json();
  const raw  = data.content.find(b => b.type === 'text')?.text || '';
  const json = raw.replace(/```json|```/g,'').trim();
  return JSON.parse(json);
}

// ═══════════════════════════════════════════════
//  CARICAMENTO GIORNALIERO CON CACHE
// ═══════════════════════════════════════════════
async function loadDailyStory() {
  const key = todayKey();
  dateLabel.textContent = todayLabel();

  // Controlla cache localStorage
  try {
    const cached = localStorage.getItem(key);
    if (cached) {
      currentStoryData = JSON.parse(cached);
      dayStrip.textContent = '📖 ' + (currentStoryData.dayTitle || 'Storia del giorno');
      hideLoading();
      loadScene('s0');
      return;
    }
  } catch(e) {}

  // Nessuna cache: chiama API
  if (!API_KEY || API_KEY === 'LA_TUA_API_KEY_QUI') {
    // API key non configurata: usa fallback silenziosamente
    loadFallback();
    return;
  }

  try {
    currentStoryData = await generateDailyStory();
    // Salva in cache
    try { localStorage.setItem(key, JSON.stringify(currentStoryData)); } catch(e) {}
    dayStrip.textContent = '📖 ' + (currentStoryData.dayTitle || 'Storia del giorno');
    hideLoading();
    loadScene('s0');
  } catch(err) {
    console.error('API error:', err);
    showError(err.message);
  }
}

function retryLoad() {
  errorOvl.classList.remove('show');
  loadingOvl.classList.remove('hidden');
  setTimeout(loadDailyStory, 300);
}

function loadFallback() {
  errorOvl.classList.remove('show');
  currentStoryData = FALLBACK_STORY;
  dayStrip.textContent = '📖 Storia Classica';
  hideLoading();
  loadScene('s0');
}

function hideLoading() {
  loadingOvl.classList.add('hidden');
}

function showError(msg) {
  loadingOvl.classList.add('hidden');
  document.getElementById('err-msg').textContent =
    'Ops! ' + (msg || 'Errore di connessione') + '. Riprova o usa la storia classica!';
  errorOvl.classList.add('show');
}

// ═══════════════════════════════════════════════
//  NAVIGAZIONE SCENE
// ═══════════════════════════════════════════════
function loadScene(sceneId, opts={}) {
  const {points=0, reset=false} = opts;

  if (reset) {
    gameState = {score:0, inventory:[], currentScene:'s0', visitedScenes:new Set()};
    pointsEl.textContent = '0';
    invItems.innerHTML   = '🎒';
    progressBar.style.width = '0%';
  }

  updateScore(points);

  const scenes = currentStoryData?.scenes || FALLBACK_STORY.scenes;
  const scene  = scenes[sceneId];
  if (!scene) return;

  gameState.currentScene = sceneId;
  gameState.visitedScenes.add(sceneId);

  if (scene.collectItem) addToInventory(scene.collectItem);
  if (scene.progress !== undefined) updateProgress(scene.progress);
  if (sceneId === 's4') flashVictory();

  // Transizione
  contentAnim.classList.add('slide-out');

  setTimeout(() => {
    // SVG
    const svgContent = SVG_SCENES[scene.visual] || SVG_SCENES.garden;
    sceneSVG.classList.add('fade-out');
    setTimeout(() => {
      sceneSVG.innerHTML = svgContent;
      sceneSVG.classList.remove('fade-out');
    }, 260);

    // Testo
    titleEl.textContent = scene.title;
    storyEl.innerHTML   = scene.text;

    // Bottoni
    choicesEl.innerHTML = '';
    (scene.choices || []).forEach(choice => {
      const btn = document.createElement('button');
      btn.className = 'btn-choice' + (choice.points ? ' gold' : '');
      btn.innerHTML = `
        <span class="btn-emoji">${choice.emoji || '✨'}</span>
        <span>${choice.text}</span>
        ${choice.points ? `<span class="btn-pts">+${choice.points}⭐</span>` : ''}
      `;
      btn.addEventListener('click', () =>
        loadScene(choice.next, {points: choice.points||0, reset: choice.reset||false})
      );
      choicesEl.appendChild(btn);
    });

    contentAnim.classList.remove('slide-out');
    contentAnim.classList.add('slide-in');
    setTimeout(() => contentAnim.classList.remove('slide-in'), 420);
  }, 260);
}

// ═══════════════════════════════════════════════
//  UTILITÀ HUD
// ═══════════════════════════════════════════════
function updateScore(delta) {
  if (!delta) return;
  gameState.score += delta;
  pointsEl.textContent = gameState.score;
  scoreDisplay.classList.remove('pop');
  void scoreDisplay.offsetWidth;
  scoreDisplay.classList.add('pop');
  spawnStar(delta);
}

function spawnStar(delta) {
  const r    = scoreDisplay.getBoundingClientRect();
  const el   = document.createElement('div');
  el.className  = 'floating-star';
  el.textContent = '+'+delta+'⭐';
  el.style.left  = (r.left + r.width/2 - 20)+'px';
  el.style.top   = (r.bottom + 6)+'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1400);
}

function addToInventory(emoji) {
  if (!emoji) return;
  gameState.inventory.push(emoji);
  const sp = document.createElement('span');
  sp.className  = 'inventory-item';
  sp.textContent = emoji;
  if (invItems.textContent === '🎒') invItems.textContent = '';
  invItems.appendChild(sp);
}

function updateProgress(step) {
  progressBar.style.width = Math.min((step/TOTAL_SCENES)*100, 100)+'%';
}

function flashVictory() {
  victoryOvl.classList.add('show');
  setTimeout(() => victoryOvl.classList.remove('show'), 800);
}
